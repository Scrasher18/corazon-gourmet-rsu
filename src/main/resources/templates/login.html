<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso | Corazón Gourmet RSU</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>

<div class="login-fullscreen">

    <div class="login-sidebar">
        <div class="sidebar-bg"></div>
        <div class="sidebar-overlay"></div>
        <div class="sidebar-content">
            <div class="sidebar-chip">
                <div class="chip-dot"></div>
                Gestión Social RSU v1.0 • 2026
            </div>
            <h2 class="sidebar-title">Corazón<br>Gourmet</h2>
            <div class="sidebar-divider"></div>
            <p class="sidebar-desc">Gastronomía con identidad, propósito social y compromiso universitario.</p>
        </div>
    </div>

    <div class="login-form-section">
        <div class="form-wrapper">

            <div class="logo-wrap">
                <img th:src="@{/img/logo.png}" alt="Logo">
            </div>

            <div class="form-header">
                <h1>Bienvenido</h1>
                <p>Ingresa tus credenciales para continuar</p>
            </div>

            <div th:if="${error}" class="alert-error">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="10"></circle>
                    <line x1="12" y1="8" x2="12" y2="12"></line>
                    <line x1="12" y1="16" x2="12.01" y2="16"></line>
                </svg>
                <span th:text="${error}"></span>
            </div>

            <form th:action="@{/login}" method="post">

                <div class="field-group">
                    <label class="field-label">
                        <svg viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                            <circle cx="12" cy="7" r="4"></circle>
                        </svg>
                        DNI de usuario
                    </label>
                    <input type="text" name="dni" class="field-input" placeholder="8 dígitos" required maxlength="8">
                </div>

                <div class="field-group">
                    <label class="field-label">
                        <svg viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                            <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                        </svg>
                        Contraseña
                    </label>
                    <input type="password" name="password" class="field-input" placeholder="••••••••" required>
                </div>

                <button type="submit" class="btn-submit">
                    INGRESAR AL PANEL
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                        <polyline points="12 5 19 12 12 19"></polyline>
                    </svg>
                </button>

            </form>

            <div class="form-footer">
                Corazón Gourmet RSU • Todos los derechos reservados
            </div>

        </div>
    </div>

</div>

</body>
</html>
