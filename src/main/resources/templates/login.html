<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Acceso | Corazón Gourmet RSU</title>
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
        <style>

            :root {
                --primary: #6366f1;
                --primary-dark: #4f46e5;
                --bg-page: #0f172a;
                --bg-panel: #1e293b;
                --text-main: #f8fafc;
                --text-muted: #94a3b8;
                --border: rgba(255, 255, 255, 0.1);
            }

            body, html {
                margin: 0;
                padding: 0;
                height: 100%;
                font-family: 'Inter', sans-serif;
                background-color: var(--bg-page);
                overflow: hidden;
            }

            .login-fullscreen {
                display: flex;
                width: 100vw;
                height: 100vh;
            }


            .login-sidebar {
                width: 45%;
                position: relative;
                display: flex;
                align-items: flex-end;
                padding: 60px;
                background: #111827;
            }

            .sidebar-bg {
                position: absolute;
                inset: 0;
                background-image: url('/img/img-sidebar.jpg');
                background-size: cover;
                background-position: center;
                opacity: 0.7; 
                z-index: 0;
            }

            .sidebar-overlay {
                position: absolute;
                inset: 0;
                background: linear-gradient(to top, var(--bg-page) 0%, transparent 100%);
                z-index: 1;
            }

            .sidebar-content {
                position: relative;
                z-index: 2;
            }

            .sidebar-title {
                font-size: 3.5rem;
                font-weight: 800;
                margin: 0;
                line-height: 1;
                letter-spacing: -0.05em;
                color: white;
            }


            .login-form-section {
                width: 55%;
                background-color: var(--bg-panel);
                display: flex;
                justify-content: center;
                align-items: center;
                padding: 40px;
            }

            .form-wrapper {
                width: 100%;
                max-width: 400px;
            }

            .logo-wrap {
                text-align: center;
                margin-bottom: 40px;
            }

            .logo-wrap img {
                height: 100px;
                filter: drop-shadow(0 10px 20px rgba(0,0,0,0.5));
            }

            .form-header h1 {
                font-size: 2.2rem;
                font-weight: 800;
                margin: 0;
                text-align: center;
                letter-spacing: -0.04em;
            }

            .form-header p {
                color: var(--text-muted);
                text-align: center;
                margin: 10px 0 30px;
            }


            .field-group {
                margin-bottom: 20px;
            }

            .field-label {
                display: block;
                font-size: 0.75rem;
                font-weight: 700;
                color: var(--text-muted);
                text-transform: uppercase;
                margin-bottom: 8px;
                letter-spacing: 0.05em;
            }

            .field-input {
                width: 100%;
                padding: 14px 16px;
                background: var(--bg-page);
                border: 1px solid var(--border);
                border-radius: 12px;
                color: white;
                font-size: 1rem;
                transition: 0.3s;
            }

            .field-input:focus {
                outline: none;
                border-color: var(--primary);
                box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.2);
            }

            .btn-submit {
                width: 100%;
                padding: 16px;
                background: var(--primary);
                color: white;
                border: none;
                border-radius: 12px;
                font-size: 1rem;
                font-weight: 700;
                cursor: pointer;
                transition: 0.3s;
                margin-top: 10px;
            }

            .btn-submit:hover {
                background: var(--primary-dark);
                transform: translateY(-2px);
                box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            }

            .alert-error {
                background: rgba(248, 113, 113, 0.1);
                border: 1px solid rgba(248, 113, 113, 0.3);
                color: #f87171;
                padding: 14px;
                border-radius: 10px;
                font-size: 0.85rem;
                margin-bottom: 25px;
                text-align: center;
            }

            @media (max-width: 900px) {
                .login-sidebar {
                    display: none;
                }
                .login-form-section {
                    width: 100%;
                }
            }
        </style>
    </head>
    <body>

        <div class="login-fullscreen">
            <div class="login-sidebar">
                <div class="sidebar-bg"></div>
                <div class="sidebar-overlay"></div>
                <div class="sidebar-content">
                    <h2 class="sidebar-title">Corazón<br>Gourmet</h2>
                    <p style="color: var(--text-muted); margin-top: 20px; font-weight: 500;">
                        Sabor con propósito social.
                    </p>
                </div>
            </div>

            <div class="login-form-section">
                <div class="form-wrapper">
                    <div class="logo-wrap">
                        <img th:src="@{/img/logo.png}" alt="Logo">
                    </div>

                    <div class="form-header">
                        <h1>Bienvenido</h1>
                        <p>Ingresa tus datos de acceso</p>
                    </div>

                    <div th:if="${error}" class="alert-error" th:text="${error}">
                        Credenciales incorrectas
                    </div>

                    <form th:action="@{/login}" method="post">
                        <div class="field-group">
                            <label class="field-label">DNI de usuario</label>
                            <input type="text" name="dni" class="field-input" placeholder="8 dígitos" required maxlength="8">
                        </div>

                        <div class="field-group">
                            <label class="field-label">Contraseña</label>
                            <input type="password" name="password" class="field-input" placeholder="••••••••" required>
                        </div>

                        <button type="submit" class="btn-submit">INGRESAR AL PANEL</button>
                    </form>
                </div>
            </div>
        </div>

    </body>
</html>
